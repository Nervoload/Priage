map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# The simulation load runner supplies a synthetic identity because every local
# client otherwise arrives from the same Docker-host IP. This header exists
# only in the developer edge configuration.
map $http_x_priage_test_client $edge_client_key {
  default $binary_remote_addr;
  ~.+ $http_x_priage_test_client;
}

limit_req_zone $edge_client_key zone=public_api:10m rate=80r/s;
limit_conn_zone $edge_client_key zone=socket_clients:10m;

log_format simulation '$remote_addr test_client=$http_x_priage_test_client '
                      '"$request" status=$status upstream=$upstream_status bytes=$body_bytes_sent';

server {
  listen 8080;
  server_name _;
  access_log /var/log/nginx/access.log simulation;
  client_max_body_size 12m;

  location / {
    limit_req zone=public_api burst=160 nodelay;
    limit_conn socket_clients 40;
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Priage-Gateway-Token dev-gateway-secret;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_read_timeout 75s;
  }
}
