[databases]
priage = host=postgres port=5432 dbname=priage user=priage password=priage

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 1200
default_pool_size = 50
reserve_pool_size = 10
reserve_pool_timeout = 3
server_idle_timeout = 60
server_lifetime = 600
query_timeout = 30
client_idle_timeout = 120
ignore_startup_parameters = extra_float_digits
admin_users = priage
stats_users = priage
